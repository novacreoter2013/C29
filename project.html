<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAVASCRIPT ASYNC/AWAIT</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --text: #1f2937;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        #result {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>System Output</h2>
        <h1 id="result"></h1>
        <div class="badge">Async/Await Active</div>
    </div>

    <script>
     async function add(a,b,c ) {
    let response = await a + b + c;
    display(response);

}

function display(sum) {
    document.getElementById("result").innerHTML =sum;
}

add(19,12,27);

    </script>

</body>
</html>
